name: Build & Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for version calculation

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test
        continue-on-error: true  # Don't block release on test failures (pre-release)

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Get version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "0.0.1")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Create version tag
        id: tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            # Increment patch version
            PATCH=$(echo ${{ steps.version.outputs.version }} | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION=$(echo ${{ steps.version.outputs.version }} | sed "s/\.$PATCH$/.$NEW_PATCH/")
            TAG="v$NEW_VERSION"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "Incremented to: $NEW_VERSION"
          fi

      - name: Find APK file
        id: apk
        run: |
          APK=$(find . -name "*.apk" -type f | grep -E "debug.*\.apk$" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find app/build/outputs/apk -name "*.apk" -type f | head -1)
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          body: |
            ## Automated Build
            - **Branch:** main
            - **Commit:** ${{ github.sha }}
            - **Build Time:** ${{ github.event.head_commit.timestamp }}
            
            ## Changes
            ${{ github.event.head_commit.message }}
            
            ## Installation
            Download and install the APK on your Android device.
            
            > **Note:** This is a debug build. For production, configure signing.
          artifacts: ${{ steps.apk.outputs.apk_path }}
          artifactErrorsFailBuild: true
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: true  # Mark as pre-release until 1.0.0

      - name: Upload APK as artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug-${{ steps.tag.outputs.tag }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30
