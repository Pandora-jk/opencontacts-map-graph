name: Feature Branch Release

on:
  push:
    branches:
      - 'feature/*'
      - 'feat/*'
      - 'test/*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      
      - name: Generate version from branch name
        id: version
        run: |
          # Extract branch name
          BRANCH_NAME=$(echo "${{ github.ref }}" | sed 's/refs\/heads\///')
          # Convert branch name to version-safe format
          # e.g., feature/my-feature -> 0.0.1-feature-my-feature
          VERSION_SUFFIX=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9]/-/g' | cut -c1-50)
          VERSION="0.0.1-$VERSION_SUFFIX"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
      
      - name: Find APK
        id: apk
        run: |
          APK=$(find app/build -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found. Dumping build output:"
            ls -la app/build/outputs || true
            exit 1
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"
      
      - name: Create Feature Release
        uses: ncipollo/release-action@v1
        with:
          tag: "feature-${{ github.ref_name }}"
          name: "Feature: ${{ github.ref_name }}"
          body: |
            ## Feature Build
            - **Branch:** ${{ github.ref_name }}
            - **Commit:** ${{ github.sha }}
            - **Built:** ${{ github.event.head_commit.timestamp }}
            
            ## Installation
            Download and install the APK on your Android device.
            
            > **Note:** This is a debug build with testing enabled.
          artifacts: ${{ steps.apk.outputs.apk_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: true
          allowUpdates: true
          updateOnlyUnreleased: true
      
      - name: Comment on PR (if exists)
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });
            
            if (prs.length > 0) {
              const prNumber = prs[0].number;
              const releaseUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/releases/tag/feature-${branch}`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `🚀 **Feature APK built!**\n\nDownload: [${releaseUrl}](${releaseUrl})\n\n_This APK was automatically generated from this PR._`
              });
            }
