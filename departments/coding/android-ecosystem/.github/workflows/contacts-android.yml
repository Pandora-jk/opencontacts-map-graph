name: Contacts Android

on:
  pull_request:
    paths:
      - "apps/contacts/**"
      - "core/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/contacts-android.yml"
  push:
    branches:
      - main
      - "feature/**"
      - "bugfix/**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew --no-daemon :apps:contacts:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: contacts-debug-apk
          path: apps/contacts/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate release secrets
        env:
          CONTACTS_KEYSTORE_BASE64: ${{ secrets.CONTACTS_KEYSTORE_BASE64 }}
          CONTACTS_KEYSTORE_PASSWORD: ${{ secrets.CONTACTS_KEYSTORE_PASSWORD }}
          CONTACTS_KEY_ALIAS: ${{ secrets.CONTACTS_KEY_ALIAS }}
          CONTACTS_KEY_PASSWORD: ${{ secrets.CONTACTS_KEY_PASSWORD }}
        run: |
          test -n "$CONTACTS_KEYSTORE_BASE64"
          test -n "$CONTACTS_KEYSTORE_PASSWORD"
          test -n "$CONTACTS_KEY_ALIAS"
          test -n "$CONTACTS_KEY_PASSWORD"

      - name: Write signing files
        env:
          CONTACTS_KEYSTORE_BASE64: ${{ secrets.CONTACTS_KEYSTORE_BASE64 }}
          CONTACTS_KEYSTORE_PASSWORD: ${{ secrets.CONTACTS_KEYSTORE_PASSWORD }}
          CONTACTS_KEY_ALIAS: ${{ secrets.CONTACTS_KEY_ALIAS }}
          CONTACTS_KEY_PASSWORD: ${{ secrets.CONTACTS_KEY_PASSWORD }}
        run: |
          printf '%s' "$CONTACTS_KEYSTORE_BASE64" | base64 --decode > contacts-release.keystore
          {
            echo "storeFile=contacts-release.keystore"
            echo "storePassword=$CONTACTS_KEYSTORE_PASSWORD"
            echo "keyAlias=$CONTACTS_KEY_ALIAS"
            echo "keyPassword=$CONTACTS_KEY_PASSWORD"
          } > keystore.properties

      - name: Build release APK
        run: ./gradlew --no-daemon :apps:contacts:assembleRelease

      - name: Prepare release asset
        run: |
          mkdir -p dist
          cp apps/contacts/build/outputs/apk/release/contacts-release.apk "dist/contacts-${GITHUB_REF_NAME}.apk"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: contacts-release-apk
          path: dist/contacts-*.apk
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/contacts-*.apk
          generate_release_notes: true
