[Service]
# Keep the patch helper non-fatal across upstream bundle changes.
ExecStartPre=
ExecStartPre=-/usr/bin/python3 /home/ubuntu/.openclaw/workspace/tools/patch-openclaw-reply.py
Restart=always
RestartSec=3

# Kill the entire gateway process tree on restart so autonomous cron child jobs
# do not survive as orphans across reloads.
KillMode=control-group
TimeoutStopSec=15
