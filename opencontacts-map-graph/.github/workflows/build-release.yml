name: Build & Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Get version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "0.1.0")
          if ! [[ "$VERSION" =~ ^0\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version '$VERSION' is invalid. Expected semantic version in 0.x.y format."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Create version tag
        id: tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            PATCH=$(echo ${{ steps.version.outputs.version }} | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION=$(echo ${{ steps.version.outputs.version }} | sed "s/\.$PATCH$/.$NEW_PATCH/")
            TAG="v$NEW_VERSION"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Find APK file
        id: apk
        run: |
          EXPECTED_APK="app/build/outputs/apk/debug/app-debug.apk"

          if [ -f "$EXPECTED_APK" ]; then
            APK="$EXPECTED_APK"
          else
            APK=$(find app/build -name "*.apk" -type f | head -1 || true)
          fi

          if [ -z "$APK" ]; then
            echo "No APK found. Dumping build output for diagnostics:"
            ls -la app/build/outputs || true
            ls -la app/build/outputs/apk || true
            find app/build -type f | head -100 || true
            exit 1
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          body: |
            ## Automated Build
            - **Branch:** main
            - **Commit:** ${{ github.sha }}
            
            ## Installation
            Download and install the APK on your Android device.
            
            > **Note:** This is a debug build.
          artifacts: ${{ steps.apk.outputs.apk_path }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: true

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug-${{ steps.tag.outputs.tag }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30
